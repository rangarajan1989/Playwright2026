name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # === NEW EMAIL NOTIFICATION STEP ===
      - name: Send Email Notification on Failure
        if: always() # This ensures the email is ONLY sent if the "Run Playwright tests" step fails
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP Server settings (Example using Gmail)
          server_address: smtp.gmail.com
          server_port: 465
          # Securely fetch credentials from GitHub Secrets
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          # Email Content
          subject: "❌ Playwright Test Failure: ${{ github.repository }}"
          to: rangarajanragavan@gmail.com # Add your target emails here
          from: GitHub Actions Auditor <your-sender-email@gmail.com>
          body: |
            Playwright tests have failed on the branch "${{ github.ref_name }}".

            You can view the run and download the report here:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
